<div class="row g-3 m-2">
  <div class="col-6 col-md-4 col-lg-2" *ngFor="let item of genVect">
    <div class="card text-center shadow-sm h-100">
      <div class="card-body">
        <div style="font-size: 2.5rem;">{{item.emoji}}</div>
        <div class="text-secondary fw-bold small">{{item.name}}</div>
      </div>
    </div>
  </div>
</div>
